logger:

    # Logger settings
    # Logs specific actions pertaining to souls

    # Enable/Disable this feature entirely
    enabled: true

    log-soul-spawns: true # Log soul spawns (when a soul is created)
    log-soul-pickups: true # Log soul pickups (when they are picked up by the player)
    log-soul-explosions: true # Log soul explosions (otherwise known as when they disappear)

    # Log format

    # Placeholders:
    # <soul_owner> for soul owner (player)
    # <x> for x coordinate
    # <y> for y coordinate
    # <z> for z coordinate
    # <world> for world name, configure world name aliases before for readability

    log-soul-spawns-message: "<gray>[SoulTracker]</gray> <green>Soul spawned for <yellow><soul_owner></yellow> at <yellow><x>, <y>, <z></yellow> in <yellow><world></yellow></green>"
    log-soul-pickups-message: "<gray>[SoulTracker]</gray> <yellow><soul_owner></yellow><green> picked up a soul at <yellow><x>, <y>, <z></yellow> in <yellow><world></yellow></green>"
    log-soul-explosions-message: "<gray>[SoulTracker]</gray> <red>Soul for <yellow><soul_owner></yellow> exploded at <yellow><x>, <y>, <z></yellow> in <yellow><world></yellow></red>"


hologram:

    # Hologram settings
    # Holograms are displayed above the soul's grave

    # Enable/Disable this feature entirely
    enabled: true

    # Enable/Disable hologram persistence
    # If enabled, holograms will persist through server restarts
    persistent: false

    # Configure the location of the hologram relative to the soul's location
    x-offset: 0.0
    y-offset: 3.5
    z-offset: 0.0

    # Scale of the hologram (x,y,z)
    scale: "1.0,1.0,1.0"

    # Billboard setting (CENTER, FIXED, HORIZONTAL, VERTICAL)
    billboard: "CENTER"

    # Text alignment (CENTER, LEFT, RIGHT)
    text-alignment: "CENTER"
    
    # See through blocks?
    see-through: false

    # Configure the background
    custom-background: false
    background-color: "1,100,255,79" # ARGB format

    # Configure the text shadow
    text-shadow: false
    
    # Shadow details (Only applies if text-shadow is true)
    shadow-radius: 0
    shadow-strength: 1.0

    # Configure the text of the hologram using MiniMessage

    # Placeholders:
    # <soul_owner> for soul owner (player)
    # <soul_formatted_death_time> for when the soul was created (when the player died)
    # <soul_raw_death_time> for when the soul was created - when the player died (in milliseconds)
    # <soul_formatted_expire_time> for when the soul will expire
    # <soul_raw_expire_time> for when the soul will expire (in milliseconds)
    # <soul_formatted_time_left> for how long the soul has left until it expires and explodes
    # <soul_raw_time_left> for how long the soul has left until it expires and explodes (in milliseconds)
    # <soul_inventory_amount> for the amount of items in the soul's inventory (number of stacks)
    # <soul_experience_amount> for the amount of experience in the soul's inventory
    lines:
        - ""
        - "<aqua>☠ <bold>SOUL GRAVE</bold> <dark_gray>»</dark_gray> <white><soul_owner></white></aqua>"
        - "<gray>Passed away at <white><soul_formatted_death_time></white></gray>"
        - ""
        - "<aqua>[ᴛᴏᴜᴄʜ ᴛʜᴇ ɢʀᴀᴠᴇ ᴛᴏ ʀᴇᴛʀɪᴇᴠᴇ ᴇꜱꜱᴇɴᴄᴇ]</aqua>"
        - ""

    # How frequently should we update the holograms in ticks? Default: 10 (0.5 seconds)
    update-ticks: 10

death-coordinates:

    # Death Coordinate settings
    # This feature sends soul coordinates to the players' chat when they die.

    # Enable/Disable this feature entirely
    enabled: true

    # Configure the text of the death coordinates message using MiniMessage
    # Placeholders:
    # <soul_owner> for soul owner (player)
    # <x> for x coordinate
    # <y> for y coordinate
    # <z> for z coordinate
    # <world> for world name, configure world name aliases before for readability

    message: "<red>☠ Your soul has spawned at <white><x>, <y>, <z></white> in the <white><world></white>.</red>"


options:

    # Date format
    date-format: "yyyy-MM-dd HH:mm:ss"

    # Time format
    # <d> for days, <h> for hours, <m> for minutes, <s> for seconds, <x> for milliseconds
    time-format: "<m>:<s>"

    world-name-aliases:
        # World name aliases
        # This is used to display the world name in a more readable format
        # For example, "world_nether" can be displayed as "Nether"
        # This is case-sensitive and should match the world name exactly
        # The key is the world name, the value is the alias
        # Example: "world_nether": "Nether"
        world: "Overworld"
        world_nether: "Nether"
        world_the_end: "End"
        resource_world: "Resource World"
        spawn: "Spawn"
